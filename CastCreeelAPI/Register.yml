info:
  name: Register
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:8080/auth/register
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "youremail@test.com",
        "username": "youremail@test.com",
        "password": "yourpassword"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
